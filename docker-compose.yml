# Local development compose configuration (not production-hardened).
services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
      SQLITE_PATH: "/data/db.sqlite3"
    volumes:
      - backend_db:/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_PROXY_TARGET: "http://backend:8000"

volumes:
  backend_db:
